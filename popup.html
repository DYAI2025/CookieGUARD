<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cookie Guardian</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="header-content">
        <div class="logo">🛡️ Cookie Guardian</div>
        <div class="current-domain" id="currentDomain">Lade...</div>
      </div>
    </header>
    
    <main class="popup-main">
      <div class="domain-status" id="domainStatus">
        <div class="status-indicator" id="statusIndicator"></div>
        <div class="status-text" id="statusText">Status wird geladen...</div>
      </div>
      
      <div id="traffic-light-container" style="text-align:center; margin: 10px 0;">
        <img id="traffic-light-img" src="icons/ampel-gelb.png" alt="Ampel" style="width:80px; display:inline-block;">
      </div>
      
      <div class="quick-actions" id="quickActions">
        <button class="action-btn block" data-action="block">
          🔴 Blockieren
        </button>
        <button class="action-btn essential" data-action="essential">
          🟡 Essentiell
        </button>
        <button class="action-btn accept" data-action="accept">
          🟢 Akzeptieren
        </button>
      </div>
      
      <div class="stats-section">
        <h3>Statistiken</h3>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="blocked-count">-</div>
            <div class="stat-label">Blocked Today</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="total-sites">-</div>
            <div class="stat-label">Total Sites</div>
          </div>
        </div>
      </div>
      
      <!-- 🤖 Cookie Bot Section -->
      <div class="section">
        <h3>🤖 Cookie Bot</h3>
        <p class="description">Automatisch Cookie-Präferenzen auf deinen Lieblings-Sites setzen</p>
        
        <div class="bot-controls">
          <div class="preference-selector">
            <label>Standard-Präferenz:</label>
            <select id="bot-preference">
              <option value="block">🔴 Alle Cookies ablehnen</option>
              <option value="essential">🟡 Nur notwendige Cookies</option>
              <option value="accept">🟢 Alle Cookies akzeptieren</option>
            </select>
          </div>
          
          <div class="bot-actions">
            <button id="start-bot-btn" class="btn btn-primary">
              🚀 Bot starten
            </button>
            <button id="stop-bot-btn" class="btn btn-secondary" disabled>
              ⏹️ Bot stoppen
            </button>
          </div>
          
          <div class="bot-status" id="bot-status">
            <div class="status-item">
              <span class="status-label">Status:</span>
              <span class="status-value" id="bot-status-text">Bereit</span>
            </div>
            <div class="status-item">
              <span class="status-label">Verarbeitet:</span>
              <span class="status-value" id="bot-processed">0</span>
            </div>
            <div class="status-item">
              <span class="status-label">In Queue:</span>
              <span class="status-value" id="bot-queue">0</span>
            </div>
          </div>
          
          <div class="bot-progress">
            <div class="progress-bar">
              <div class="progress-fill" id="bot-progress-fill"></div>
            </div>
            <div class="progress-text" id="bot-progress-text">Klicke "Bot starten" um zu beginnen</div>
          </div>
        </div>
      </div>
      
      <div class="actions-section">
        <button class="secondary-btn" id="clearDomainBtn">
          Domain-Einstellung löschen
        </button>
        <button class="secondary-btn" id="settingsBtn">
          Einstellungen
        </button>
      </div>
    </main>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
