name: GUI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb python3-tk
        # Install Playwright dependencies
        sudo npx playwright install-deps
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
        pip install playwright
        python -m playwright install chromium
    
    - name: Run GUI tests (Linux)
      if: runner.os == 'Linux'
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        python -m pytest tests/test_gui_automation.py -v --cov=clone_brief_builder --cov-report=xml
    
    - name: Run GUI tests (Windows/macOS)
      if: runner.os != 'Linux'
      run: |
        python -m pytest tests/test_gui_automation.py -v --cov=clone_brief_builder --cov-report=xml
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Test GUI launch
      run: |
        python -c "from clone_brief_builder.gui import AsyncTaskManager; print('✅ GUI imports successful')"
    
    - name: Test crawler functionality
      run: |
        python -c "from clone_brief_builder.crawler import WebCrawler; print('✅ Crawler imports successful')"
    
    - name: Run integration test (if not Windows)
      if: runner.os != 'Windows'
      run: |
        python -m clone_brief_builder --help || true 