name: Clone Brief Builder CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Install Playwright
      run: |
        playwright install chromium
        playwright install-deps

    - name: Run linting
      run: |
        python -m pip install flake8 black isort
        flake8 clone_brief_builder/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check clone_brief_builder/ tests/
        isort --check-only clone_brief_builder/ tests/

    - name: Run tests with coverage
      run: |
        xvfb-run -a python -m pytest tests/ -v --cov=clone_brief_builder --cov-report=xml --cov-report=html --cov-report=term-missing
      env:
        DISPLAY: :0

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate test report
      if: always()
      run: |
        python -c "
import datetime
import json
import os
from pathlib import Path

# Create reports directory
reports_dir = Path('reports')
reports_dir.mkdir(exist_ok=True)

# Generate test report
report = {
    'timestamp': datetime.datetime.now().isoformat(),
    'python_version': '${{ matrix.python-version }}',
    'runner_os': '${{ runner.os }}',
    'workflow_run': '${{ github.run_number }}',
    'branch': '${{ github.ref_name }}',
    'commit': '${{ github.sha }}'
}

with open(reports_dir / 'ci-test-report.json', 'w') as f:
    json.dump(report, f, indent=2)

print('✅ Test report generated')
"

    - name: Upload test artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          reports/
          .coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        python -m twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-packages
        path: dist/

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Install Playwright
      run: |
        playwright install chromium
    
    - name: Run integration test
      run: |
        # Test CLI functionality
        clone-brief --help
        
        # Test simple HTTP fetch
        clone-brief https://httpbin.org/html -o test_output.txt
        
        # Test package import
        python -c "import clone_brief_builder; print('✅ Package import successful')"
        
        echo "✅ Integration tests passed"

  coverage-gate:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Install Playwright
      run: |
        playwright install chromium
        playwright install-deps
    
    - name: Run coverage check
      run: |
        xvfb-run -a python -m pytest tests/ --cov=clone_brief_builder --cov-fail-under=85
        echo "✅ Coverage gate passed (≥85%)"
      env:
        DISPLAY: :0 